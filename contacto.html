                <br>
                <input type="text" name="nombre" id="id-nombre" required>
                <br>

                <br>
                <input type="email" name="mail" id="id-mail" required>
                <br>
                <label for="id-mensaje">Mensaje:</label>
                <br>
                <textarea name="mensaje" id="id-mensaje" rows="4" required></textarea>
                <br>
                <button type="reset">Borrar</button>
                <br>
                <button type="submit">Enviar</button>
            </form>
